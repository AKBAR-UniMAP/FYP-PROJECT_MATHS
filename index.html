<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | My project</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">My project</div>
      </div>
    </div>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      // Enhanced loading messages for math kids game
      function getKidFriendlyMessage(progress) {
        if (progress < 0.2) return "Getting ready for math fun! 🎯";
        if (progress < 0.4) return "Loading numbers and shapes... 🔢";
        if (progress < 0.6) return "Preparing math challenges... ➕";
        if (progress < 0.8) return "Almost ready to play! 🎮";
        return "Starting your math adventure! 🚀";
      }

      // Enhanced error handling for kids
      function kidFriendlyError(message) {
        const kidMessages = {
          "WebAssembly": "Oops! Your browser needs an update to play math games. Try using a newer browser! 🌟",
          "WebGL": "Math games need special graphics! Please update your browser or enable graphics. 🎨",
          "network": "Can't connect to load the game. Check your internet and try again! 📡",
          "memory": "Not enough space to load the game. Try closing other tabs! 💾"
        };

        for (const [key, msg] of Object.entries(kidMessages)) {
          if (message.toLowerCase().includes(key.toLowerCase())) {
            return msg;
          }
        }
        return "Something went wrong loading the game. Please refresh and try again! 🔄";
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/html.loader.js";
      var mathLoaderUrl = "math-game-loader.js";
      var wasmOptimizerUrl = "wasm-optimizer.js";
      var config = {
        dataUrl: buildUrl + "/html.data.gz",
        frameworkUrl: buildUrl + "/html.framework.js.gz",
        codeUrl: buildUrl + "/html.wasm.gz",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "MathKidsGame",
        productName: "Math Adventure",
        productVersion: "1.0",
        showBanner: function(msg, type) {
          if (type === 'error') {
            msg = kidFriendlyError(msg);
          }
          unityShowBanner(msg, type);
        },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      // Add loading message display
      var loadingMessage = document.createElement('div');
      loadingMessage.id = 'unity-loading-message';
      loadingMessage.style.cssText = 'position: absolute; left: 50%; top: 40%; transform: translate(-50%, -50%); color: white; font-family: Arial, sans-serif; font-size: 18px; text-align: center;';
      document.getElementById('unity-container').appendChild(loadingMessage);

      // Load the WebAssembly optimizer first
      var wasmOptimizerScript = document.createElement("script");
      wasmOptimizerScript.src = wasmOptimizerUrl;
      document.body.appendChild(wasmOptimizerScript);

      // Load the enhanced math game loader
      var mathLoaderScript = document.createElement("script");
      mathLoaderScript.src = mathLoaderUrl;
      mathLoaderScript.onload = () => {
        // Initialize the enhanced loader
        var mathLoader = new MathGameLoader(config);
        mathLoader.initialize().then(() => {
          // Now load the Unity loader
          var unityScript = document.createElement("script");
          unityScript.src = loaderUrl;
          unityScript.onload = () => {
            mathLoader.createInstance(canvas, (progress) => {
              progressBarFull.style.width = 100 * progress + "%";
              loadingMessage.textContent = getKidFriendlyMessage(progress);
            }).then((unityInstance) => {
              loadingBar.style.display = "none";
              loadingMessage.style.display = "none";
              fullscreenButton.onclick = () => {
                mathLoader.enterFullscreen();
              };

              // Add keyboard shortcuts for kids
              document.addEventListener('keydown', (e) => {
                if (e.key === 'f' || e.key === 'F') {
                  mathLoader.enterFullscreen();
                }
              });

            }).catch((error) => {
              loadingBar.style.display = "none";
              loadingMessage.style.display = "none";
              alert(error.message);
            });
          };
          document.body.appendChild(unityScript);
        }).catch((error) => {
          loadingBar.style.display = "none";
          loadingMessage.style.display = "none";
          alert("Failed to initialize game loader: " + error.message);
        });
      };

      document.body.appendChild(mathLoaderScript);

      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then((registration) => {
              console.log('🎉 Service Worker registered successfully!', registration.scope);

              // Handle service worker updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version available
                    const updateMessage = document.createElement('div');
                    updateMessage.innerHTML = `
                      <div style="position: fixed; top: 10px; right: 10px; background: #4CAF50; color: white; padding: 10px; border-radius: 5px; z-index: 1000; cursor: pointer;">
                        🎮 New game version available! Click to update.
                      </div>
                    `;
                    updateMessage.onclick = () => {
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                      window.location.reload();
                    };
                    document.body.appendChild(updateMessage);

                    setTimeout(() => {
                      if (updateMessage.parentNode) {
                        updateMessage.parentNode.removeChild(updateMessage);
                      }
                    }, 10000);
                  }
                });
              });
            })
            .catch((error) => {
              console.log('❌ Service Worker registration failed:', error);
            });
        });
      } else {
        console.log('⚠️ Service Worker not supported. Offline features limited.');
      }

    </script>
  </body>
</html>
